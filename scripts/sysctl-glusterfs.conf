# =============================================================================
# drive-nmonit — Kernel Sysctl Tuning for GlusterFS
# =============================================================================
# Copy this file to /etc/sysctl.d/90-glusterfs.conf and run:
#   sudo sysctl --system
#
# These settings optimize the kernel network stack and virtual memory
# subsystem for GlusterFS distributed storage traffic.
# =============================================================================

# --- Virtual Memory ---
# Prefer caching filesystem metadata rather than swapping
vm.swappiness = 10

# Retry writing dirty pages longer before blocking writers
# Higher value = more aggressive write-back caching
vm.dirty_ratio = 30
vm.dirty_background_ratio = 5

# Retain dentry/inode cache under memory pressure
# Lower = kernel reclaims cache more aggressively
# Higher = better stat()/readdir() performance at cost of RAM
vm.vfs_cache_pressure = 50

# --- Network Tuning (General) ---
# Increase max socket receive/send buffer sizes
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216

# Increase default socket receive/send buffer sizes
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# Increase the maximum number of outstanding unprocessed packets
net.core.netdev_max_backlog = 5000

# --- TCP Tuning ---
# TCP auto-tuning buffer limits (min, default, max)
# 1GbE:    min=4096  default=87380   max=16777216
# 10GbE:   min=4096  default=87380   max=33554432
# 40GbE+:  min=4096  default=87380   max=67108864
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Enable TCP window scaling (required for high-throughput)
net.ipv4.tcp_window_scaling = 1

# Enable TCP timestamps (helps RTT estimation)
net.ipv4.tcp_timestamps = 1

# Enable selective ACKs (reduces retransmit overhead)
net.ipv4.tcp_sack = 1

# Enable TCP Fast Open (reduces latency for new connections)
net.ipv4.tcp_fastopen = 3

# Increase TCP max backlog
net.ipv4.tcp_max_syn_backlog = 8192

# Enable TCP keepalive (help detect dead peers faster)
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5

# Reduce TIME_WAIT socket lifetime (faster port reuse)
net.ipv4.tcp_fin_timeout = 15

# Allow recycling of TIME_WAIT sockets for new connections
# Note: Do NOT enable tcp_tw_recycle — it's removed in modern kernels
net.ipv4.tcp_tw_reuse = 1

# Disable slow start after idle (keeps cwnd high for long transfers)
net.ipv4.tcp_slow_start_after_idle = 0

# --- Jumbo Frame Support ---
# If jumbo frames (MTU 9000) are enabled on your network:
# net.ipv4.ip_no_pmtu_disc = 1

# --- Connection Tracking ---
# Increase connection tracking table size for many GlusterFS bricks
# Each brick uses multiple TCP connections
net.netfilter.nf_conntrack_max = 262144
net.netfilter.nf_conntrack_tcp_timeout_established = 86400
